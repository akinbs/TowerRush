<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>IcyTower</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      html,
      body {
        width: 100%;
        height: 100%;
        background: #000;
        overflow: hidden;
        display: flex;
        align-items: center;
        justify-content: center;
      }

      #game-container {
        width: 100%;
        height: 100%;
      }

      #game-container canvas {
        display: block;
        margin: 0 auto;
      }
    </style>
  </head>
  <body>
    <div id="game-container"></div>
    <!--
      YouTube Playables SDK — must load BEFORE the game bundle so `window.ytgame`
      exists when our code runs. This classic <script> executes before the
      deferred ES module below. In local dev the request may not resolve; that
      is expected — the bridge degrades to a no-op fallback when ytgame is absent.
    -->
    <script src="https://www.youtube.com/game_api/v1"></script>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
