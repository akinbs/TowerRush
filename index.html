<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>IcyTower</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      html,
      body {
        width: 100%;
        height: 100%;
        background: #000;
        overflow: hidden;
        display: flex;
        align-items: center;
        justify-content: center;
      }

      #game-container {
        width: 100%;
        height: 100%;
      }

      #game-container canvas {
        display: block;
        margin: 0 auto;
      }
    </style>
  </head>
  <body>
    <div id="game-container"></div>
    <!--
      TODO: YouTube Playables SDK
      <script src="https://www.youtube.com/playables/..."></script>
      Call ytgame.game.firstFrameReady() after first render.
      Call ytgame.game.gameReady() when the game is interactive.
    -->
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
